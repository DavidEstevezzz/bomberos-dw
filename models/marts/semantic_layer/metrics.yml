metrics:
  - name: m_coste_total_horas_extra
    type: simple
    label: "Coste total de horas extra"
    type_params:
      measure:
        name: coste_total

  - name: m_total_horas_extra
    type: simple
    label: "Total de horas extra"
    type_params:
      measure:
        name: total_horas

  - name: m_coste_medio_por_hora
    type: ratio
    label: "Coste medio por hora extra"
    type_params:
      numerator: m_coste_total_horas_extra
      denominator: m_total_horas_extra

  - name: m_total_solicitudes
    type: simple
    label: "Total de solicitudes"
    type_params:
      measure:
        name: conteo_solicitudes

  - name: m_solicitudes_confirmadas
    type: simple
    label: "Solicitudes confirmadas"
    type_params:
      measure:
        name: conteo_solicitudes
    filter: "{{ Dimension('estado') }} = 'confirmada'"

  - name: m_tasa_aprobacion
    type: ratio
    label: "Tasa de aprobación"
    type_params:
      numerator: m_solicitudes_confirmadas
      denominator: m_total_solicitudes

  - name: m_total_requerimientos
    type: simple
    label: "Total de requerimientos"
    type_params:
      measure:
        name: suma_requerimientos

  - name: m_ratio_requerimientos_por_solicitud
    type: ratio
    label: "Requerimientos por solicitud"
    type_params:
      numerator: m_total_requerimientos
      denominator: m_total_solicitudes

  - name: m_total_incidencias
    type: simple
    label: "Total de incidencias"
    type_params:
      measure:
        name: total_incidencias

  - name: m_incidencias_resueltas
    type: simple
    label: "Incidencias resueltas"
    type_params:
      measure:
        name: incidencias_resueltas

  - name: m_incidencias_pendientes
    type: simple
    label: "Incidencias pendientes"
    type_params:
      measure:
        name: incidencias_pendientes

  - name: m_tasa_resolucion
    type: ratio
    label: "Tasa de resolución"
    type_params:
      numerator: m_incidencias_resueltas
      denominator: m_total_incidencias

  - name: m_tasa_pendientes
    type: ratio
    label: "Tasa de pendientes"
    type_params:
      numerator: m_incidencias_pendientes
      denominator: m_total_incidencias