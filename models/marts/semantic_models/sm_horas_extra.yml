version: 2

semantic_models:
  - name: horas_extra
    model: ref('fact_horas_extra')
    primary_entity: horas_extra
    defaults:
      agg_time_dimension: fecha
    entities:
      - name: horas_extra
        type: primary
        expr: horas_extra_key
      - name: empleado
        type: foreign
        expr: empleado_key
    dimensions:
      - name: fecha
        type: time
        expr: fecha
        type_params:
          time_granularity: day
      - name: tipo_dia
        type: categorical
        expr: tipo_dia
      - name: tipo_salario
        type: categorical
        expr: tipo_salario
    measures:
      - name: coste_total
        agg: sum
        expr: coste_total
      - name: coste_diurno
        agg: sum
        expr: coste_diurno
      - name: coste_nocturno
        agg: sum
        expr: coste_nocturno
      - name: total_horas
        agg: sum
        expr: total_horas
      - name: bomberos_distintos
        agg: count_distinct
        expr: id_empleado