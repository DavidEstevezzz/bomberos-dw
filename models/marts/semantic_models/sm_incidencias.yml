version: 2

semantic_models:
  - name: incidencias
    model: ref('fact_incidencias')
    primary_entity: incidencia
    defaults:
      agg_time_dimension: fecha_incidencia
    entities:
      - name: incidencia
        type: primary
        expr: incidencia_key
      - name: parque
        type: foreign
        expr: parque_key
      - name: empleado_creador
        type: foreign
        expr: empleado_creador_key
      - name: empleado_resolutor
        type: foreign
        expr: empleado_resolutor_key
    dimensions:
      - name: fecha_incidencia
        type: time
        expr: fecha_incidencia
        type_params:
          time_granularity: day
      - name: estado
        type: categorical
        expr: estado
      - name: nivel_gravedad
        type: categorical
        expr: nivel_gravedad
      - name: tipo_incidencia
        type: categorical
        expr: tipo_incidencia
    measures:
      - name: total_incidencias
        agg: count
        expr: id_incidencia
      - name: incidencias_resueltas
        agg: sum
        expr: es_resuelta
      - name: incidencias_pendientes
        agg: sum
        expr: es_pendiente
      - name: incidencias_tramitadas
        agg: sum
        expr: es_tramitada
      - name: mttr_dias
        agg: average
        expr: dias_resolucion