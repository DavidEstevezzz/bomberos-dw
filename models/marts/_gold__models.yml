


  version: 2

models:
  - name: dim_parque
    description: "Dimensión de parques de bomberos de Granada."
    config:
      contract:
        enforced: true
    columns:
      - name: parque_key
        data_type: varchar
        description: "Surrogate key del parque."
        constraints:
          - type: not_null
        data_tests:
          - unique
          - not_null
      - name: id_parque
        data_type: number(38,0)
        description: "Clave natural del parque."
        data_tests:
          - unique
          - not_null
      - name: nombre_parque
        data_type: varchar
        description: "Nombre del parque."
      - name: ubicacion
        data_type: varchar
        description: "Ubicación geográfica del parque."

  - name: dim_brigada
    description: "Dimensión de brigadas con parque denormalizado (star schema)."
    config:
      contract:
        enforced: true
    columns:
      - name: brigada_key
        data_type: varchar
        description: "Surrogate key de la brigada."
        constraints:
          - type: not_null
        data_tests:
          - unique
          - not_null
      - name: id_brigada
        data_type: number(38,0)
        description: "Clave natural de la brigada."
        data_tests:
          - unique
          - not_null
      - name: nombre_brigada
        data_type: varchar
        description: "Nombre de la brigada (A-F para operativas)."
        data_tests:
          - not_null
      - name: es_especial
        data_type: boolean
        description: "TRUE si es brigada especial (Vacaciones, Bajas, etc.)."
      - name: es_brigada_servicio
        data_type: boolean
        description: "TRUE si es brigada operativa (A-F)."
      - name: id_parque
        data_type: number(38,0)
        description: "FK natural al parque."
      - name: nombre_parque
        data_type: varchar
        description: "Nombre del parque denormalizado."

  - name: dim_puesto
    description: "Dimensión de puestos operativos con categoría derivada."
    config:
      contract:
        enforced: true
    columns:
      - name: puesto_key
        data_type: varchar
        description: "Surrogate key del puesto."
        constraints:
          - type: not_null
        data_tests:
          - unique
          - not_null
      - name: nombre_puesto
        data_type: varchar
        description: "Nombre del puesto: Conductor, Operador, Bombero, Subinspector, Oficial."
        data_tests:
          - not_null
      - name: categoria_puesto
        data_type: varchar
        description: "Categoría: Tropa o Mando."
      - name: es_tropa
        data_type: boolean
        description: "TRUE si el puesto pertenece a Tropa."
      - name: es_mando
        data_type: boolean
        description: "TRUE si el puesto pertenece a Mando."

  - name: dim_vehiculo
    description: "Dimensión de vehículos con matrícula tokenizada y parque denormalizado."
    config:
      contract:
        enforced: true
    columns:
      - name: vehiculo_key
        data_type: varchar
        description: "Surrogate key del vehículo."
        constraints:
          - type: not_null
        data_tests:
          - unique
          - not_null
      - name: matricula_token
        data_type: varchar
        description: "Matrícula anonimizada (VEHICULO_001)."
        data_tests:
          - unique
          - not_null
      - name: nombre_vehiculo
        data_type: varchar
        description: "Nombre descriptivo del vehículo."
      - name: tipo_vehiculo
        data_type: varchar
        description: "Tipo de vehículo."
      - name: anio_vehiculo
        data_type: number(38,0)
        description: "Año del vehículo."
      - name: id_parque
        data_type: number(38,0)
        description: "FK natural al parque."
      - name: nombre_parque
        data_type: varchar
        description: "Nombre del parque denormalizado."

  - name: dim_equipo
    description: "Dimensión de equipos personales con parque denormalizado."
    config:
      contract:
        enforced: true
    columns:
      - name: equipo_key
        data_type: varchar
        description: "Surrogate key del equipo."
        constraints:
          - type: not_null
        data_tests:
          - unique
          - not_null
      - name: id_equipo
        data_type: number(38,0)
        description: "Clave natural del equipo."
        data_tests:
          - unique
          - not_null
      - name: nombre_equipo
        data_type: varchar
        description: "Nombre del equipo."
      - name: categoria_equipo
        data_type: varchar
        description: "Categoría del equipo."
      - name: esta_disponible
        data_type: boolean
        description: "TRUE si el equipo está disponible."
      - name: id_parque
        data_type: number(38,0)
        description: "FK natural al parque."
      - name: nombre_parque
        data_type: varchar
        description: "Nombre del parque denormalizado."

  - name: dim_salario
    description: "Dimensión de tarifas salariales por tipo de puesto."
    config:
      contract:
        enforced: true
    columns:
      - name: salario_key
        data_type: varchar
        description: "Surrogate key del salario."
        constraints:
          - type: not_null
        data_tests:
          - unique
          - not_null
      - name: id_salario
        data_type: number(38,0)
        description: "Clave natural del salario."
        data_tests:
          - unique
          - not_null
      - name: tipo_salario
        data_tests:
          - accepted_values:
              arguments:
                values: ['Subinspector', 'Tropa']
      - name: fecha_vigencia
        data_type: date
        description: "Fecha de inicio de vigencia de la tarifa."
      - name: precio_hora_diurna
        data_type: number(38,0)
        description: "Precio por hora diurna."
      - name: precio_hora_nocturna
        data_type: number(38,0)
        description: "Precio por hora nocturna."
      - name: horas_diurnas_jornada
        data_type: number(38,0)
        description: "Horas diurnas según tipo de día (15/6/2)."
      - name: horas_nocturnas_jornada
        data_type: number(38,0)
        description: "Horas nocturnas según tipo de día (9/18/22)."

  - name: dim_fecha
    description: "Dimensión de calendario generada desde las guardias con tipo de día, festivos y atributos temporales."
    config:
      contract:
        enforced: true
    columns:
      - name: fecha_key
        data_type: varchar
        description: "Surrogate key de la fecha."
        constraints:
          - type: not_null
        data_tests:
          - unique
          - not_null
      - name: fecha
        data_type: date
        description: "Fecha natural."
        data_tests:
          - unique
          - not_null
      - name: anio
        data_type: number(38,0)
        description: "Año."
      - name: trimestre
        data_type: number(38,0)
        description: "Trimestre (1-4)."
      - name: mes
        data_type: number(38,0)
        description: "Mes (1-12)."
      - name: mes_nombre
        data_type: varchar
        description: "Nombre del mes."
      - name: semana_anio
        data_type: number(38,0)
        description: "Semana del año (1-52)."
      - name: dia
        data_type: number(38,0)
        description: "Día del mes."
      - name: dia_semana_num
        data_type: number(38,0)
        description: "Día de la semana numérico (0=Domingo)."
      - name: dia_semana_nombre
        data_type: varchar
        description: "Nombre del día de la semana."
      - name: tipo_dia
        data_type: varchar
        description: "Tipo de día: festivo, prefestivo, laborable."
      - name: es_festivo
        data_type: boolean
        description: "TRUE si es día festivo."
      - name: es_prefestivo
        data_type: boolean
        description: "TRUE si es día prefestivo."
      - name: es_laborable
        data_type: boolean
        description: "TRUE si es día laborable."
      - name: es_fin_de_semana
        data_type: boolean
        description: "TRUE si es sábado o domingo."
      - name: sin_datos_guardia
        data_type: boolean
        description: "TRUE si no hay registro de guardia para esta fecha (fecha fuera del calendario de guardias)."

  - name: dim_empleado
    description: "Dimensión de empleados SCD Tipo 2. Cada cambio de puesto o rol genera una nueva versión."
    config:
      contract:
        enforced: true
    columns:
      - name: empleado_key
        data_type: varchar
        description: "Surrogate key única por versión del empleado (id_empleado + fecha_inicio_validez)."
        constraints:
          - type: not_null
        data_tests:
          - unique
          - not_null
      - name: id_empleado
        data_type: number(38,0)
        constraints:
          - type: not_null
        data_tests:
          - not_null
      - name: nombre_token
        data_type: varchar
        description: "Nombre anonimizado (BOMBERO_XXX)."
      - name: tipo_usuario
        data_type: varchar
        data_tests:
          - accepted_values:
              arguments:
                values: ['jefe', 'mando', 'bombero', 'empleado', 'desconocido']
      - name: puesto
        data_type: varchar
        description: "Puesto operativo."
      - name: categoria_puesto
        data_type: varchar
        data_tests:
          - accepted_values:
              arguments:
                values: ['Tropa', 'Mando', 'Administrativo', 'desconocido']

      - name: es_mando_especial
        data_type: boolean
        description: "TRUE si es mando especial."
      - name: fecha_inicio_validez
        data_type: timestamp_ntz
        description: "Fecha desde la que esta versión es válida."
        data_tests:
          - not_null
      - name: fecha_fin_validez
        data_type: timestamp_ntz
        description: "Fecha hasta la que esta versión fue válida. NULL si es la versión actual."
      - name: es_version_actual
        data_type: boolean
        description: "TRUE si es la versión vigente del empleado (no eliminado y sin fecha fin)."
      - name: es_eliminado
        data_type: boolean
        description: "TRUE si el empleado fue dado de baja del sistema (hard delete detectado)."
    
  - name: fact_horas_extra
    description: "Tabla de hechos de horas extra con costes calculados. Materialización incremental. FK empleado_key resuelta vía point-in-time lookup contra dim_empleado SCD2."
    config:
      contract:
        enforced: true


    columns:
      - name: horas_extra_key
        data_type: varchar
        description: "Surrogate key del hecho."
        constraints:
          - type: not_null
        data_tests:
          - unique
          - not_null
          # 1. El total de horas debe ser la suma exacta
          - dbt_utils.expression_is_true:
              arguments:
                expression: "total_horas = horas_diurnas + horas_nocturnas"
              config:
                severity: error
          # 2. El coste total debe ser la suma de costes parciales
          - dbt_utils.expression_is_true:
              arguments:
                expression: "coste_total = coste_diurno + coste_nocturno"
              config:
                severity: error
          # 3. Las horas no pueden ser negativas
          - dbt_utils.expression_is_true:
              arguments:
                expression: "horas_diurnas >= 0 AND horas_nocturnas >= 0"
          # 4. El coste no puede ser negativo (con tolerancia a centimos por redondeo)
          - dbt_utils.expression_is_true:
              arguments:
                expression: "coste_total >= 0"
      - name: empleado_key
        data_type: varchar
        description: "FK a dim_empleado SCD2 — versión vigente en la fecha de la hora extra."
        constraints:
          - type: not_null
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_empleado')
                field: empleado_key
      - name: fecha_key
        data_type: varchar
        description: "FK a dim_fecha."
        data_tests:
          - relationships:
              arguments:
                to: ref('dim_fecha')
                field: fecha_key
      - name: brigada_key
        data_type: varchar
        description: "FK a dim_brigada de la guardia."
        data_tests:
          - relationships:
              arguments:
                to: ref('dim_brigada')
                field: brigada_key
      - name: salario_key
        data_type: varchar
        description: "FK a dim_salario."
        data_tests:
          - relationships:
              arguments:
                to: ref('dim_salario')
                field: salario_key
      - name: id_hora_extra
        data_type: number(38,0)
        description: "Clave natural de la hora extra."
      - name: id_empleado
        data_type: number(38,0)
        description: "ID del bombero."
      - name: fecha
        data_type: date
        description: "Fecha de la hora extra."
      - name: id_salario
        data_type: number(38,0)
        description: "ID del salario aplicado."
      - name: horas_diurnas
        data_type: number(38,0)
        description: "Horas diurnas realizadas."
      - name: horas_nocturnas
        data_type: number(38,0)
        description: "Horas nocturnas realizadas."
      - name: total_horas
        data_type: number(38,0)
        description: "Total de horas (diurnas + nocturnas)."
      - name: precio_hora_diurna
        data_type: number(38,0)
        description: "Precio por hora diurna según tarifa."
      - name: precio_hora_nocturna
        data_type: number(38,0)
        description: "Precio por hora nocturna según tarifa."
      - name: coste_diurno
        data_type: number(38,0)
        description: "Coste total diurno (horas × precio)."
      - name: coste_nocturno
        data_type: number(38,0)
        description: "Coste total nocturno (horas × precio)."
      - name: coste_total
        data_type: number(38,0)
        description: "Coste total de la hora extra (diurno + nocturno)."
      - name: tipo_dia
        data_tests:
          - accepted_values:
              arguments:
                values: ['festivo', 'prefestivo', 'laborable', 'festivo víspera']
      - name: tipo_salario
        data_tests:
          - accepted_values:
              arguments:
                values: ['Subinspector', 'Tropa']
      - name: fecha_creacion
        data_type: timestamp_ntz
        description: "Fecha de creación del registro."
      - name: fecha_actualizacion
        data_type: timestamp_ntz
        description: "Fecha de última actualización."


  - name: fact_solicitudes
    description: "Tabla de hechos de solicitudes de permisos. FK empleado_key resuelta vía point-in-time lookup contra dim_empleado SCD2 con fecha_inicio como fecha de efecto."
    config:
      contract:
        enforced: true

    columns:
      - name: solicitud_key
        data_type: varchar
        description: "Surrogate key del hecho."
        constraints:
          - type: not_null
        data_tests:
          - unique
          - not_null
          # 1. Días solicitados al menos 1
          - dbt_utils.expression_is_true:
              arguments:
                expression: "dias_solicitados >= 1"
          # 2. Las asignaciones generadas no pueden ser negativas
          - dbt_utils.expression_is_true:
              arguments:
                expression: "total_asignaciones_generadas >= 0"
          # 3. Los requerimientos no pueden ser más que las asignaciones (un requerimiento es una asignación forzada)
          - dbt_utils.expression_is_true:
              arguments:
                expression: "total_requerimientos_generados <= total_asignaciones_generadas"
          # 4. Si hay fecha_fin, debe ser >= fecha_inicio
          - dbt_utils.expression_is_true:
              arguments:
                expression: "fecha_fin >= fecha_inicio"
              config:
                where: "fecha_fin IS NOT NULL"
      - name: empleado_key
        data_type: varchar
        description: "FK a dim_empleado SCD2 — versión vigente en fecha_inicio del permiso."
        constraints:
          - type: not_null
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_empleado')
                field: empleado_key
      - name: fecha_inicio_key
        data_type: varchar
        description: "FK a dim_fecha (fecha inicio permiso). Role-playing dimension."
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_fecha')
                field: fecha_key
      - name: fecha_fin_key
        data_type: varchar
        description: "FK a dim_fecha (fecha fin permiso). Role-playing dimension."
        data_tests:
          - relationships:
              arguments:
                to: ref('dim_fecha')
                field: fecha_key
              config:
                where: "fecha_fin_key IS NOT NULL"
      - name: id_solicitud
        data_type: number(38,0)
        description: "Clave natural de la solicitud."
      - name: id_empleado
        data_type: number(38,0)
        description: "ID del bombero solicitante."
      - name: id_empleado_gestor
        data_type: number(38,0)
        description: "ID del gestor que tramita la solicitud."
      - name: tipo_permiso
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - 'vacaciones'
                  - 'asuntos propios'
                  - 'horas sindicales'
                  - 'salidas personales'
                  - 'vestuario'
                  - 'licencias por jornadas'
                  - 'licencias por dias'
                  - 'modulo'
                  - 'compensacion grupos especiales'
      - name: turno
        data_type: varchar
        description: "Turno afectado."
      - name: estado
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['pendiente', 'confirmada', 'cancelada', 'denegada']
      - name: fecha_inicio
        data_type: date
        description: "Fecha de inicio del permiso."
      - name: fecha_fin
        data_type: date
        description: "Fecha de fin del permiso."
      - name: horas_solicitadas
        data_type: number(38,0)
        description: "Horas solicitadas (para salidas personales)."
      - name: dias_solicitados
        data_type: number(38,0)
        description: "Días de duración calculados (fecha_fin - fecha_inicio + 1)."
      - name: total_asignaciones_generadas
        data_type: number(38,0)
        description: "Número de asignaciones generadas por esta solicitud."
      - name: total_requerimientos_generados
        data_type: number(38,0)
        description: "Número de requerimientos forzados generados."
      - name: fecha_creacion
        data_type: timestamp_ntz
        description: "Fecha de creación."
      - name: fecha_actualizacion
        data_type: timestamp_ntz
        description: "Fecha de última actualización."

  - name: fact_incidencias
    description: |
      Tabla de hechos de incidencias. Dos role-playing dimensions sobre dim_empleado:
      - empleado_creador_key: versión vigente en fecha_incidencia
      - empleado_resolutor_key: versión vigente en fecha_actualizacion (solo cuando estado='resuelta'); resto cae en Default Row '-1'
    config:
      contract:
        enforced: true


    columns:
      - name: incidencia_key
        data_type: varchar
        constraints:
          - type: not_null
        data_tests:
          - unique
          - not_null
          # 1. Si la incidencia está resuelta, debe tener resolutor (excepto cuando huérfano '-1')
          - dbt_utils.expression_is_true:
              arguments:
                expression: "es_resuelta = 1 AND empleado_resolutor_key IS NOT NULL"
              config:
                where: "estado = 'resuelta'"
          # 2. Coherencia entre estado y flags
          - dbt_utils.expression_is_true:
              arguments:
                expression: "(es_resuelta + es_pendiente + es_tramitada) = 1"
          # 3. Si está resuelta, dias_resolucion no debería ser NULL
          - dbt_utils.expression_is_true:
              arguments:
                expression: "dias_resolucion IS NOT NULL"
              config:
                where: "estado = 'resuelta'"
                severity: warn
                # warn porque tienes el filtro defensivo en staging que pone NULL si fechas son corruptas
          # 4. dias_resolucion razonable (menos de 5 años — más allá es dato corrupto)
          - dbt_utils.expression_is_true:
              arguments:
                expression: "dias_resolucion BETWEEN 0 AND 1825"
              config:
                where: "dias_resolucion IS NOT NULL"
      - name: empleado_creador_key
        data_type: varchar
        description: "FK a dim_empleado SCD2 (rol: creador). Resuelto con fecha_incidencia."
        constraints:
          - type: not_null
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_empleado')
                field: empleado_key
      - name: empleado_resolutor_key
        data_type: varchar
        description: "FK a dim_empleado SCD2 (rol: resolutor). Resuelto con fecha_actualizacion si estado='resuelta'; '-1' en otro caso."
        constraints:
          - type: not_null
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_empleado')
                field: empleado_key
      - name: fecha_key
        data_type: varchar
        description: "FK a dim_fecha."
        data_tests:
          - relationships:
              arguments:
                to: ref('dim_fecha')
                field: fecha_key
      - name: parque_key
        data_type: varchar
        description: "FK a dim_parque."
        data_tests:
          - relationships:
              arguments:
                to: ref('dim_parque')
                field: parque_key
      - name: vehiculo_key
        data_type: varchar
        description: "FK a dim_vehiculo (solo si tipo=vehiculo)."
      - name: equipo_key
        data_type: varchar
        description: "FK a dim_equipo (solo si tipo=equipo)."
      - name: id_incidencia
        data_type: number(38,0)
        description: "Clave natural."
      - name: id_empleado_creador
        data_type: number(38,0)
        description: "ID del creador."
      - name: id_empleado_resolutor
        data_type: number(38,0)
        description: "ID del resolutor."
      - name: id_empleado_referenciado
        data_type: number(38,0)
        description: "ID del empleado referenciado (si tipo=personal)."
      - name: fecha_incidencia
        data_type: date
        description: "Fecha de la incidencia."
      - name: id_parque
        data_type: number(38,0)
        description: "ID del parque."
      - name: matricula_vehiculo
        data_type: varchar
        description: "Matrícula tokenizada del vehículo."
      - name: id_equipo
        data_type: number(38,0)
        description: "ID del equipo personal."
      - name: nombre_equipo_comun
        data_type: varchar
        description: "Nombre del equipo común (texto libre)."
      - name: tipo_incidencia
        data_type: varchar
        description: "Tipo: vehiculo, personal, equipo, instalacion, vestuario, equipos_comunes."
      - name: estado
        data_type: varchar
        description: "Estado: resuelta, tramitada, pendiente."
      - name: nivel_gravedad
        data_type: varchar
        description: "Nivel: bajo, medio, alto."
        data_tests:
          - accepted_values:
              arguments:
                values: ['bajo', 'medio', 'alto', '']
      - name: esta_leido
        data_type: boolean
        description: "TRUE si la incidencia fue leída."
      - name: dias_resolucion
        data_type: number(38,0)
        description: "Días entre creación y resolución (solo para resueltas)."
        data_tests:
          - dbt_utils.expression_is_true:
              arguments:
                expression: "dias_resolucion >= 0"
              config:
                where: "dias_resolucion IS NOT NULL"
      - name: es_resuelta
        data_type: number(38,0)
        description: "1 si está resuelta, 0 si no."
      - name: es_pendiente
        data_type: number(38,0)
        description: "1 si está pendiente, 0 si no."
      - name: es_tramitada
        data_type: number(38,0)
        description: "1 si está tramitada, 0 si no."
      - name: fecha_creacion
        data_type: timestamp_ntz
        description: "Fecha de creación."
      - name: fecha_actualizacion
        data_type: timestamp_ntz
        description: "Fecha de última actualización."


  - name: dim_time
    description: "Time spine diaria para MetricFlow. Necesaria para resolución de granularidades y métricas cumulative."
    config:
      contract:
        enforced: true
