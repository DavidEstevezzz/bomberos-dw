version: 2

models:
  - name: dim_parque
    description: "Dimensión de parques de bomberos de Granada."
    config:
      contract:
        enforced: true
      group: shared
      access: public
      tags:
        - dimension
        - shared
    columns:
      - name: parque_key
        data_type: varchar
        description: "Surrogate key del parque."
        constraints:
          - type: not_null
        data_tests:
          - unique
          - not_null
      - name: id_parque
        data_type: number(38,0)
        description: "Clave natural del parque."
        data_tests:
          - unique
          - not_null
      - name: nombre_parque
        data_type: varchar
        description: "Nombre del parque."
      - name: ubicacion
        data_type: varchar
        description: "Ubicación geográfica del parque."

  - name: dim_brigada
    description: "Dimensión de brigadas con parque denormalizado (star schema)."
    config:
      contract:
        enforced: true
      group: shared
      access: public
      tags:
        - dimension
        - shared
      meta:
        owner: "Equipo de Datos - Bomberos Granada"
        criticality: high
        domain: shared
    columns:
      - name: brigada_key
        data_type: varchar
        description: "Surrogate key de la brigada."
        constraints:
          - type: not_null
        data_tests:
          - unique
          - not_null
      - name: id_brigada
        data_type: number(38,0)
        description: "Clave natural de la brigada."
        data_tests:
          - unique
          - not_null
      - name: nombre_brigada
        data_type: varchar
        description: "Nombre de la brigada (A-F para operativas)."
        data_tests:
          - not_null
      - name: es_especial
        data_type: boolean
        description: "TRUE si es brigada especial (Vacaciones, Bajas, etc.)."
      - name: es_brigada_servicio
        data_type: boolean
        description: "TRUE si es brigada operativa (A-F)."
      - name: id_parque
        data_type: number(38,0)
        description: "FK natural al parque."
      - name: nombre_parque
        data_type: varchar
        description: "Nombre del parque denormalizado."

  - name: dim_puesto
    description: "Dimensión de puestos operativos con categoría derivada."
    config:
      contract:
        enforced: true
    columns:
      - name: puesto_key
        data_type: varchar
        description: "Surrogate key del puesto."
        constraints:
          - type: not_null
        data_tests:
          - unique
          - not_null
      - name: nombre_puesto
        data_type: varchar
        description: "Nombre del puesto: Conductor, Operador, Bombero, Subinspector, Oficial."
        data_tests:
          - not_null
      - name: categoria_puesto
        data_type: varchar
        description: "Categoría: Tropa o Mando."
      - name: es_tropa
        data_type: boolean
        description: "TRUE si el puesto pertenece a Tropa."
      - name: es_mando
        data_type: boolean
        description: "TRUE si el puesto pertenece a Mando."

  - name: dim_vehiculo
    description: "Dimensión de vehículos con matrícula tokenizada y parque denormalizado."
    config:
      contract:
        enforced: true
      group: mantenimiento
      access: protected
      tags:
        - dimension
        - dominio_mantenimiento
    columns:
      - name: vehiculo_key
        data_type: varchar
        description: "Surrogate key del vehículo."
        constraints:
          - type: not_null
        data_tests:
          - unique
          - not_null
      - name: matricula_token
        data_type: varchar
        description: "Matrícula anonimizada (VEHICULO_001)."
        data_tests:
          - unique
          - not_null
      - name: nombre_vehiculo
        data_type: varchar
        description: "Nombre descriptivo del vehículo."
      - name: tipo_vehiculo
        data_type: varchar
        description: "Tipo de vehículo."
      - name: anio_vehiculo
        data_type: number(38,0)
        description: "Año del vehículo."
      - name: id_parque
        data_type: number(38,0)
        description: "FK natural al parque."
      - name: nombre_parque
        data_type: varchar
        description: "Nombre del parque denormalizado."

  - name: dim_equipo
    description: "Dimensión de equipos personales con parque denormalizado."
    config:
      contract:
        enforced: true
      group: mantenimiento
      access: protected
      tags:
        - dimension
        - dominio_mantenimiento
    columns:
      - name: equipo_key
        data_type: varchar
        description: "Surrogate key del equipo."
        constraints:
          - type: not_null
        data_tests:
          - unique
          - not_null
      - name: id_equipo
        data_type: number(38,0)
        description: "Clave natural del equipo."
        data_tests:
          - unique
          - not_null
      - name: nombre_equipo
        data_type: varchar
        description: "Nombre del equipo."
      - name: categoria_equipo
        data_type: varchar
        description: "Categoría del equipo."
      - name: esta_disponible
        data_type: boolean
        description: "TRUE si el equipo está disponible."
      - name: id_parque
        data_type: number(38,0)
        description: "FK natural al parque."
      - name: nombre_parque
        data_type: varchar
        description: "Nombre del parque denormalizado."

  - name: dim_salario
    description: "Dimensión de tarifas salariales por tipo de puesto."
    config:
      contract:
        enforced: true
      group: costes
      access: protected
      tags:
        - dimension
        - dominio_costes
      meta:
        owner: "Jefatura del Cuerpo de Bomberos de Granada"
        domain: costes
        contains_sensitive_data: true
    columns:
      - name: salario_key
        data_type: varchar
        description: "Surrogate key del salario."
        constraints:
          - type: not_null
        data_tests:
          - unique
          - not_null
      - name: id_salario
        data_type: number(38,0)
        description: "Clave natural del salario."
        data_tests:
          - unique
          - not_null
      - name: tipo_salario
        data_type: varchar
        description: "Tipo de salario aplicado."
        data_tests:
          - accepted_values:
              arguments:
                values: ['Subinspector', 'Tropa']
      - name: fecha_vigencia
        data_type: date
        description: "Fecha de inicio de vigencia de la tarifa."
      - name: precio_hora_diurna
        data_type: number(10,2)
        description: "Precio por hora diurna."
      - name: precio_hora_nocturna
        data_type: number(10,2)
        description: "Precio por hora nocturna."
      - name: horas_diurnas_jornada
        data_type: number(38,0)
        description: "Horas diurnas según tipo de día."
      - name: horas_nocturnas_jornada
        data_type: number(38,0)
        description: "Horas nocturnas según tipo de día."

  - name: dim_fecha
    description: "Dimensión de calendario. Construida sobre dim_time (time spine) y enriquecida con tipo de día desde guardias operativas + fallback derivado para días sin guardia."
    config:
      contract:
        enforced: true
      group: shared
      access: public
      tags:
        - dimension
        - shared
        - business_critical
    columns:
      - name: fecha_key
        data_type: varchar
        description: "Surrogate key del día."
        constraints:
          - type: not_null
        data_tests:
          - unique
          - not_null
      - name: fecha
        data_type: date
        description: "Día calendario."
        constraints:
          - type: not_null
        data_tests:
          - unique
          - not_null
      - name: anio
        data_type: number(38,0)
        description: "Año."
      - name: trimestre
        data_type: number(38,0)
        description: "Trimestre del año (1-4)."
      - name: mes
        data_type: number(38,0)
        description: "Mes del año (1-12)."
      - name: mes_nombre
        data_type: varchar
        description: "Nombre del mes en inglés (Snowflake MONTHNAME)."
      - name: semana_anio
        data_type: number(38,0)
        description: "Semana del año (1-52)."
      - name: dia
        data_type: number(38,0)
        description: "Día del mes."
      - name: dia_semana_num
        data_type: number(38,0)
        description: "Día de la semana numérico (0=Domingo, 6=Sábado)."
      - name: dia_semana_nombre
        data_type: varchar
        description: "Nombre del día de la semana."
      - name: tipo_dia
        data_type: varchar
        description: "Tipo de día: festivo, prefestivo, laborable, fin de semana, festivo víspera. Prioridad: guardia operativa > fallback derivado."
        data_tests:
          - accepted_values:
              arguments:
                values: ['festivo', 'prefestivo', 'laborable', 'festivo víspera']
      - name: sin_datos_guardia
        data_type: boolean
        description: "TRUE si no hay registro de guardia para esta fecha. Útil para auditoría de calidad de dato."
      - name: es_festivo
        data_type: boolean
        description: "TRUE si tipo_dia='festivo'."
      - name: es_prefestivo
        data_type: boolean
        description: "TRUE si tipo_dia='prefestivo'."
      - name: es_festivo_vispera
        data_type: boolean
        description: "TRUE si tipo_dia='festivo víspera' (festivo que además es víspera de otro festivo)."
      - name: es_laborable
        data_type: boolean
        description: "TRUE si es laborable (incluye días L-V sin info de guardia)."
      - name: es_fin_de_semana
        data_type: boolean
        description: "TRUE si tipo_dia='fin de semana'."

  - name: dim_empleado
    description: "Dimensión de empleados SCD Tipo 2. Cada cambio de puesto o rol genera una nueva versión."
    config:
      contract:
        enforced: true
      group: shared
      access: public
      tags:
        - dimension
        - scd2
        - shared
        - business_critical
      meta:
        owner: "Equipo de Datos - Bomberos Granada"
        criticality: high
        domain: shared
        pii_status: masked
        scd_type: 2
    columns:
      - name: empleado_key
        data_type: varchar
        description: "Surrogate key única por versión del empleado (id_empleado + fecha_inicio_validez)."
        constraints:
          - type: not_null
        data_tests:
          - unique
          - not_null
      - name: id_empleado
        data_type: number(38,0)
        description: "ID natural del empleado en el OLTP."
        constraints:
          - type: not_null
        data_tests:
          - not_null
      - name: nombre_token
        data_type: varchar
        description: "Nombre anonimizado (BOMBERO_XXX)."
      - name: tipo_usuario
        data_type: varchar
        description: "Tipo de usuario en la aplicación."
        data_tests:
          - accepted_values:
              arguments:
                values: ['jefe', 'mando', 'bombero', 'empleado', 'desconocido']
      - name: puesto
        data_type: varchar
        description: "Puesto operativo."
      - name: categoria_puesto
        data_type: varchar
        description: "Categoría funcional del puesto."
        data_tests:
          - accepted_values:
              arguments:
                values: ['Tropa', 'Mando', 'Administrativo', 'desconocido']
      - name: es_mando_especial
        data_type: boolean
        description: "TRUE si es mando especial."
      - name: fecha_inicio_validez
        data_type: timestamp_ntz
        description: "Fecha desde la que esta versión es válida."
        data_tests:
          - not_null
      - name: fecha_fin_validez
        data_type: timestamp_ntz
        description: "Fecha hasta la que esta versión fue válida. NULL si es la versión actual."
      - name: es_version_actual
        data_type: boolean
        description: "TRUE si es la versión vigente del empleado (no eliminado y sin fecha fin)."
      - name: es_eliminado
        data_type: boolean
        description: "TRUE si el empleado fue dado de baja del sistema (hard delete detectado)."

  - name: fact_horas_extra
    description: "Tabla de hechos de horas extra con costes calculados. Materialización incremental. FK empleado_key resuelta vía point-in-time lookup contra dim_empleado SCD2."
    config:
      contract:
        enforced: true
      group: costes
      access: public
      tags:
        - fact
        - dominio_costes
        - business_critical
        - presentation_portfolio
      meta:
        owner: "Jefatura del Cuerpo de Bomberos de Granada"
        domain: costes
        criticality: high
        grain: "una fila por id_hora_extra"
        sla: daily

    semantic_model:
      enabled: true
      name: horas_extra

    agg_time_dimension: fecha

    metrics:
      - name: coste_total_horas_extra
        type: simple
        label: "Coste total de horas extra"
        agg: sum
        expr: coste_total

      - name: coste_diurno_horas_extra
        type: simple
        label: "Coste diurno de horas extra"
        agg: sum
        expr: coste_diurno

      - name: coste_nocturno_horas_extra
        type: simple
        label: "Coste nocturno de horas extra"
        agg: sum
        expr: coste_nocturno

      - name: total_horas_extra
        type: simple
        label: "Total de horas extra"
        agg: sum
        expr: total_horas

      - name: bomberos_con_horas_extra
        type: simple
        label: "Bomberos distintos con horas extra"
        agg: count_distinct
        expr: id_empleado

    data_tests:
      - dbt_utils.expression_is_true:
          arguments:
            expression: "total_horas = horas_diurnas + horas_nocturnas"
          config:
            severity: error

      - dbt_utils.expression_is_true:
          arguments:
            expression: "ABS(coste_total - (coste_diurno + coste_nocturno)) <= 0.01"
          config:
            severity: error

      - dbt_utils.expression_is_true:
          arguments:
            expression: "horas_diurnas >= 0 AND horas_nocturnas >= 0"

      - dbt_utils.expression_is_true:
          arguments:
            expression: "coste_total >= 0"
    
    columns:
      - name: horas_extra_key
        data_type: varchar
        description: "Surrogate key del hecho."
        entity:
          name: horas_extra
          type: primary
        constraints:
          - type: not_null
        data_tests:
          - unique
          - not_null

      - name: empleado_key
        data_type: varchar
        description: "FK a dim_empleado SCD2 — versión vigente en la fecha de la hora extra."
        entity:
          name: empleado
          type: foreign
        constraints:
          - type: not_null
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_empleado')
                field: empleado_key

      - name: fecha_key
        data_type: varchar
        description: "FK a dim_fecha."
        data_tests:
          - relationships:
              arguments:
                to: ref('dim_fecha')
                field: fecha_key

      - name: brigada_key
        data_type: varchar
        description: "FK a dim_brigada de la guardia."
        entity:
          name: brigada
          type: foreign
        data_tests:
          - relationships:
              arguments:
                to: ref('dim_brigada')
                field: brigada_key

      - name: salario_key
        data_type: varchar
        description: "FK a dim_salario."
        entity:
          name: salario
          type: foreign
        data_tests:
          - relationships:
              arguments:
                to: ref('dim_salario')
                field: salario_key

      - name: id_hora_extra
        data_type: number(38,0)
        description: "Clave natural de la hora extra."

      - name: id_empleado
        data_type: number(38,0)
        description: "ID del bombero."

      - name: fecha
        data_type: date
        description: "Fecha de la hora extra."
        granularity: day
        dimension:
          type: time

      - name: id_salario
        data_type: number(38,0)
        description: "ID del salario aplicado."

      - name: horas_diurnas
        data_type: number(38,0)
        description: "Horas diurnas realizadas."

      - name: horas_nocturnas
        data_type: number(38,0)
        description: "Horas nocturnas realizadas."

      - name: total_horas
        data_type: number(38,0)
        description: "Total de horas (diurnas + nocturnas)."

      - name: precio_hora_diurna
        data_type: number(10,2)
        description: "Precio por hora diurna según tarifa."

      - name: precio_hora_nocturna
        data_type: number(10,2)
        description: "Precio por hora nocturna según tarifa."

      - name: coste_diurno
        data_type: number(12,2)
        description: "Coste total diurno (horas × precio)."

      - name: coste_nocturno
        data_type: number(12,2)
        description: "Coste total nocturno (horas × precio)."

      - name: coste_total
        data_type: number(12,2)
        description: "Coste total de la hora extra (diurno + nocturno)."

      - name: tipo_dia
        data_type: varchar
        description: "Tipo de día asociado a la guardia: festivo, prefestivo, laborable o festivo víspera."
        dimension:
          type: categorical
        data_tests:
          - accepted_values:
              arguments:
                values: ['festivo', 'prefestivo', 'laborable', 'festivo víspera']

      - name: tipo_salario
        data_type: varchar
        description: "Tipo de tarifa salarial aplicada: Subinspector o Tropa."
        dimension:
          type: categorical
        data_tests:
          - accepted_values:
              arguments:
                values: ['Subinspector', 'Tropa']

      - name: fecha_creacion
        data_type: timestamp_ntz
        description: "Fecha de creación del registro."

      - name: fecha_actualizacion
        data_type: timestamp_ntz
        description: "Fecha de última actualización."
  
    
  - name: fact_solicitudes
    description: "Tabla de hechos de solicitudes de permisos. FK empleado_key resuelta vía point-in-time lookup contra dim_empleado SCD2 con fecha_inicio como fecha de efecto."
    config:
      contract:
        enforced: true
      group: personal
      access: public
      tags:
        - fact
        - dominio_personal
        - business_critical
        - presentation_portfolio
      meta:
        owner: "Recursos Humanos - Bomberos Granada"
        domain: personal
        criticality: high
        grain: "una fila por id_solicitud"
        sla: daily

    semantic_model:
      enabled: true
      name: solicitudes

    agg_time_dimension: fecha_inicio

    metrics:
      - name: total_solicitudes
        type: simple
        label: "Total de solicitudes"
        agg: count
        expr: id_solicitud

      - name: solicitudes_confirmadas
        type: simple
        label: "Solicitudes confirmadas"
        agg: count
        expr: id_solicitud
        filter: |
          {{ Dimension('solicitud__estado') }} = 'confirmada'

      - name: solicitudes_denegadas
        type: simple
        label: "Solicitudes denegadas"
        agg: count
        expr: id_solicitud
        filter: |
          {{ Dimension('solicitud__estado') }} = 'denegada'

      - name: dias_ausencia_solicitados
        type: simple
        label: "Días de ausencia solicitados"
        agg: sum
        expr: dias_solicitados

      - name: total_asignaciones_generadas
        type: simple
        label: "Total de asignaciones generadas"
        agg: sum
        expr: total_asignaciones_generadas

      - name: total_requerimientos
        type: simple
        label: "Total de requerimientos"
        agg: sum
        expr: total_requerimientos_generados

    data_tests:
      - dbt_utils.expression_is_true:
          arguments:
            expression: "dias_solicitados >= 1"

      - dbt_utils.expression_is_true:
          arguments:
            expression: "total_asignaciones_generadas >= 0"

      - dbt_utils.expression_is_true:
          arguments:
            expression: "total_requerimientos_generados <= total_asignaciones_generadas"

      - dbt_utils.expression_is_true:
          arguments:
            expression: "fecha_fin >= fecha_inicio"
          config:
            where: "fecha_fin IS NOT NULL"

    columns:
      - name: solicitud_key
        data_type: varchar
        description: "Surrogate key del hecho."
        entity:
          name: solicitud
          type: primary
        constraints:
          - type: not_null
        data_tests:
          - unique
          - not_null

      - name: empleado_key
        data_type: varchar
        description: "FK a dim_empleado SCD2 — versión vigente en fecha_inicio del permiso."
        entity:
          name: empleado
          type: foreign
        constraints:
          - type: not_null
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_empleado')
                field: empleado_key

      - name: fecha_inicio_key
        data_type: varchar
        description: "FK a dim_fecha (fecha inicio permiso). Role-playing dimension."
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_fecha')
                field: fecha_key

      - name: fecha_fin_key
        data_type: varchar
        description: "FK a dim_fecha (fecha fin permiso). Role-playing dimension."
        data_tests:
          - relationships:
              arguments:
                to: ref('dim_fecha')
                field: fecha_key
              config:
                where: "fecha_fin_key IS NOT NULL"

      - name: id_solicitud
        data_type: number(38,0)
        description: "Clave natural de la solicitud."

      - name: id_empleado
        data_type: number(38,0)
        description: "ID del bombero solicitante."

      - name: id_empleado_gestor
        data_type: number(38,0)
        description: "ID del gestor que tramita la solicitud."

      - name: tipo_permiso
        data_type: varchar
        description: "Tipo de permiso solicitado."
        dimension:
          type: categorical
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - 'vacaciones'
                  - 'asuntos propios'
                  - 'horas sindicales'
                  - 'salidas personales'
                  - 'vestuario'
                  - 'licencias por jornadas'
                  - 'licencias por dias'
                  - 'modulo'
                  - 'compensacion grupos especiales'

      - name: turno
        data_type: varchar
        description: "Turno afectado."
        dimension:
          type: categorical

      - name: estado
        data_type: varchar
        description: "Estado de la solicitud."
        dimension:
          type: categorical
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['pendiente', 'confirmada', 'cancelada', 'denegada']

      - name: fecha_inicio
        data_type: date
        description: "Fecha de inicio del permiso."
        granularity: day
        dimension:
          type: time

      - name: fecha_fin
        data_type: date
        description: "Fecha de fin del permiso."
        granularity: day
        dimension:
          type: time

      - name: horas_solicitadas
        data_type: number(38,0)
        description: "Horas solicitadas (para salidas personales)."

      - name: dias_solicitados
        data_type: number(38,0)
        description: "Días de duración calculados (fecha_fin - fecha_inicio + 1)."

      - name: total_asignaciones_generadas
        data_type: number(38,0)
        description: "Número de asignaciones generadas por esta solicitud."

      - name: total_requerimientos_generados
        data_type: number(38,0)
        description: "Número de requerimientos forzados generados."

      - name: fecha_creacion
        data_type: timestamp_ntz
        description: "Fecha de creación."

      - name: fecha_actualizacion
        data_type: timestamp_ntz
        description: "Fecha de última actualización."
  - name: fact_asignaciones_operativas
    description: >
      Tabla de hechos de asignaciones operativas de bomberos. Una fila por
      asignación. Permite analizar movimientos entre brigadas, asignaciones
      derivadas de solicitudes, cambios de guardia y requerimientos forzados.
    config:
      contract:
        enforced: true
      group: personal
      access: public
      tags:
        - fact
        - dominio_personal
        - dominio_operativo
        - business_critical
      meta:
        owner: "Equipo de Datos - Bomberos Granada"
        domain: operativa
        criticality: high
        grain: "una fila por id_asignacion"
        sla: daily

    data_tests:
      - dbt_utils.expression_is_true:
          arguments:
            expression: "(total_asignaciones = 1)"
      - dbt_utils.expression_is_true:
          arguments:
            expression: "(total_requerimientos IN (0, 1))"
      - dbt_utils.expression_is_true:
          arguments:
            expression: "(total_idas + total_vueltas) <= 1"
          config:
            severity: warn

    columns:
      - name: asignacion_key
        data_type: varchar
        description: "Surrogate key de la asignación operativa."
        constraints:
          - type: not_null
        data_tests:
          - unique
          - not_null

      - name: empleado_key
        data_type: varchar
        description: "FK a dim_empleado SCD2, versión vigente en la fecha de la asignación."
        constraints:
          - type: not_null
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_empleado')
                field: empleado_key

      - name: fecha_key
        data_type: varchar
        description: "FK a dim_fecha."
        data_tests:
          - relationships:
              arguments:
                to: ref('dim_fecha')
                field: fecha_key

      - name: brigada_origen_key
        data_type: varchar
        description: "FK a dim_brigada de origen. Puede ser NULL si no aplica."
        data_tests:
          - relationships:
              arguments:
                to: ref('dim_brigada')
                field: brigada_key
              config:
                where: "brigada_origen_key IS NOT NULL"

      - name: brigada_destino_key
        data_type: varchar
        description: "FK a dim_brigada de destino."
        data_tests:
          - relationships:
              arguments:
                to: ref('dim_brigada')
                field: brigada_key
              config:
                where: "brigada_destino_key IS NOT NULL"

      - name: solicitud_key
        data_type: varchar
        description: "Clave surrogate de la solicitud asociada, si existe."
        data_tests:
          - relationships:
              arguments:
                to: ref('fact_solicitudes')
                field: solicitud_key
              config:
                where: "solicitud_key IS NOT NULL"

      - name: cambio_guardia_key
        data_type: varchar
        description: "Clave surrogate del cambio de guardia asociado, si existe."

      - name: id_asignacion
        data_type: number(38,0)
        description: "Clave natural de la asignación."
        data_tests:
          - unique
          - not_null

      - name: id_empleado
        data_type: number(38,0)
        description: "ID natural del empleado asignado."

      - name: id_brigada_origen
        data_type: number(38,0)
        description: "ID natural de la brigada de origen."

      - name: id_brigada_destino
        data_type: number(38,0)
        description: "ID natural de la brigada de destino."

      - name: id_solicitud
        data_type: number(38,0)
        description: "ID natural de la solicitud asociada, si existe."

      - name: id_cambio_guardia
        data_type: number(38,0)
        description: "ID natural del cambio de guardia asociado, si existe."

      - name: id_traslado
        data_type: number(38,0)
        description: "ID natural del traslado asociado, si existe."

      - name: fecha_inicio
        data_type: date
        description: "Fecha en la que aplica la asignación."

      - name: turno
        data_type: varchar
        description: "Turno afectado por la asignación."

      - name: tipo_asignacion
        data_type: varchar
        description: "Tipo de asignación: ida o vuelta. Puede ser NULL en registros históricos."
        data_tests:
          - accepted_values:
              arguments:
                values: ['ida', 'vuelta']
              config:
                where: "tipo_asignacion IS NOT NULL"

      - name: es_requerimiento
        data_type: boolean
        description: "TRUE si la asignación corresponde a un requerimiento forzado."

      - name: total_asignaciones
        data_type: number(38,0)
        description: "Medida aditiva. Siempre vale 1 por fila."

      - name: total_requerimientos
        data_type: number(38,0)
        description: "Medida binaria. 1 si la asignación es requerimiento, 0 si no."

      - name: total_idas
        data_type: number(38,0)
        description: "Medida binaria. 1 si tipo_asignacion='ida'."

      - name: total_vueltas
        data_type: number(38,0)
        description: "Medida binaria. 1 si tipo_asignacion='vuelta'."

      - name: fecha_creacion
        data_type: timestamp_ntz
        description: "Fecha de creación del registro."

      - name: fecha_actualizacion
        data_type: timestamp_ntz
        description: "Fecha de última actualización."
  - name: fact_incidencias
    description: |
      Tabla de hechos de incidencias. Dos role-playing dimensions sobre dim_empleado:
      - empleado_creador_key: versión vigente en fecha_incidencia
      - empleado_resolutor_key: versión vigente en fecha_actualizacion (solo cuando estado='resuelta'); resto cae en Default Row '-1'
    config:
      contract:
        enforced: true
      group: mantenimiento
      access: public
      tags:
        - fact
        - dominio_mantenimiento
        - business_critical
        - presentation_portfolio
      meta:
        owner: "Mantenimiento - Bomberos Granada"
        domain: mantenimiento
        criticality: medium
        grain: "una fila por id_incidencia"
        sla: daily

    semantic_model:
      enabled: true
      name: incidencias

    agg_time_dimension: fecha_incidencia

    metrics:
      - name: total_incidencias
        type: simple
        label: "Total de incidencias"
        agg: count
        expr: id_incidencia

      - name: incidencias_resueltas
        type: simple
        label: "Incidencias resueltas"
        agg: sum
        expr: es_resuelta

      - name: incidencias_pendientes
        type: simple
        label: "Incidencias pendientes"
        agg: sum
        expr: es_pendiente

      - name: incidencias_tramitadas
        type: simple
        label: "Incidencias tramitadas"
        agg: sum
        expr: es_tramitada

      - name: mttr_dias
        type: simple
        label: "Tiempo medio de resolución en días"
        agg: average
        expr: dias_resolucion

    data_tests:
      - dbt_utils.expression_is_true:
          arguments:
            expression: "es_resuelta = 1 AND empleado_resolutor_key IS NOT NULL"
          config:
            where: "estado = 'resuelta'"

      - dbt_utils.expression_is_true:
          arguments:
            expression: "(es_resuelta + es_pendiente + es_tramitada) = 1"

      - dbt_utils.expression_is_true:
          arguments:
            expression: "dias_resolucion IS NOT NULL"
          config:
            where: "estado = 'resuelta'"
            severity: warn

      - dbt_utils.expression_is_true:
          arguments:
            expression: "dias_resolucion BETWEEN 0 AND 1825"
          config:
            where: "dias_resolucion IS NOT NULL"

    columns:
      - name: incidencia_key
        data_type: varchar
        description: "Surrogate key del hecho."
        entity:
          name: incidencia
          type: primary
        constraints:
          - type: not_null
        data_tests:
          - unique
          - not_null

      - name: empleado_creador_key
        data_type: varchar
        description: "FK a dim_empleado SCD2 (rol: creador). Resuelto con fecha_incidencia."
        entity:
          name: empleado_creador
          type: foreign
        constraints:
          - type: not_null
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_empleado')
                field: empleado_key

      - name: empleado_resolutor_key
        data_type: varchar
        description: "FK a dim_empleado SCD2 (rol: resolutor). Resuelto con fecha_actualizacion si estado='resuelta'; '-1' en otro caso."
        entity:
          name: empleado_resolutor
          type: foreign
        constraints:
          - type: not_null
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_empleado')
                field: empleado_key

      - name: fecha_key
        data_type: varchar
        description: "FK a dim_fecha."
        data_tests:
          - relationships:
              arguments:
                to: ref('dim_fecha')
                field: fecha_key

      - name: parque_key
        data_type: varchar
        description: "FK a dim_parque."
        entity:
          name: parque
          type: foreign
        data_tests:
          - relationships:
              arguments:
                to: ref('dim_parque')
                field: parque_key

      - name: vehiculo_key
        data_type: varchar
        description: "FK a dim_vehiculo (solo si tipo=vehiculo)."
        entity:
          name: vehiculo
          type: foreign

      - name: equipo_key
        data_type: varchar
        description: "FK a dim_equipo (solo si tipo=equipo)."
        entity:
          name: equipo
          type: foreign

      - name: id_incidencia
        data_type: number(38,0)
        description: "Clave natural."

      - name: id_empleado_creador
        data_type: number(38,0)
        description: "ID del creador."

      - name: id_empleado_resolutor
        data_type: number(38,0)
        description: "ID del resolutor."

      - name: id_empleado_referenciado
        data_type: number(38,0)
        description: "ID del empleado referenciado (si tipo=personal)."

      - name: fecha_incidencia
        data_type: date
        description: "Fecha de la incidencia."
        granularity: day
        dimension:
          type: time

      - name: id_parque
        data_type: number(38,0)
        description: "ID del parque."

      - name: matricula_vehiculo
        data_type: varchar
        description: "Matrícula tokenizada del vehículo."

      - name: id_equipo
        data_type: number(38,0)
        description: "ID del equipo personal."

      - name: nombre_equipo_comun
        data_type: varchar
        description: "Nombre del equipo común (texto libre)."

      - name: tipo_incidencia
        data_type: varchar
        description: "Tipo: vehiculo, personal, equipo, instalacion, vestuario, equipos_comunes."
        dimension:
          type: categorical

      - name: estado
        data_type: varchar
        description: "Estado: resuelta, tramitada, pendiente."
        dimension:
          type: categorical

      - name: nivel_gravedad
        data_type: varchar
        description: "Nivel: bajo, medio, alto."
        dimension:
          type: categorical
        data_tests:
          - accepted_values:
              arguments:
                values: ['bajo', 'medio', 'alto', '']

      - name: esta_leido
        data_type: boolean
        description: "TRUE si la incidencia fue leída."

      - name: dias_resolucion
        data_type: number(38,0)
        description: "Días entre creación y resolución (solo para resueltas)."
        data_tests:
          - dbt_utils.expression_is_true:
              arguments:
                expression: ">= 0"
              config:
                where: "dias_resolucion IS NOT NULL"

      - name: es_resuelta
        data_type: number(38,0)
        description: "1 si está resuelta, 0 si no."

      - name: es_pendiente
        data_type: number(38,0)
        description: "1 si está pendiente, 0 si no."

      - name: es_tramitada
        data_type: number(38,0)
        description: "1 si está tramitada, 0 si no."

      - name: fecha_creacion
        data_type: timestamp_ntz
        description: "Fecha de creación."

      - name: fecha_actualizacion
        data_type: timestamp_ntz
        description: "Fecha de última actualización."

  - name: dim_time
    description: "Time spine diaria para MetricFlow. Una fila por día desde 2020 a 2030. Necesaria para resolución de granularidades y métricas cumulative."
    config:
      contract:
        enforced: true
      group: shared
      access: public
      tags:
        - dimension
        - shared
        - infrastructure

    semantic_model:
      enabled: true
      name: dim_time

    primary_entity: dim_time
    agg_time_dimension: date_day

    time_spine:
      standard_granularity_column: date_day

    columns:
      - name: date_day
        data_type: date
        description: "Día calendario."
        granularity: day
        dimension:
          type: time
        constraints:
          - type: not_null
        data_tests:
          - unique
          - not_null
    metrics:
      - name: coste_medio_por_hora
        type: ratio
        label: "Coste medio por hora extra"
        numerator: coste_total_horas_extra
        denominator: total_horas_extra

      - name: tasa_aprobacion
        type: ratio
        label: "Tasa de aprobación"
        numerator: solicitudes_confirmadas
        denominator: total_solicitudes

      - name: tasa_denegacion
        type: ratio
        label: "Tasa de denegación"
        numerator: solicitudes_denegadas
        denominator: total_solicitudes

      - name: ratio_requerimientos_por_solicitud
        type: ratio
        label: "Requerimientos por solicitud"
        numerator: total_requerimientos
        denominator: total_solicitudes

      - name: tasa_resolucion
        type: ratio
        label: "Tasa de resolución"
        numerator: incidencias_resueltas
        denominator: total_incidencias

      - name: tasa_pendientes
        type: ratio
        label: "Tasa de pendientes"
        numerator: incidencias_pendientes
        denominator: total_incidencias

  