version: 2

semantic_models:
  - name: horas_extra
    model: ref('fact_horas_extra')
    primary_entity: horas_extra
    defaults:
      agg_time_dimension: fecha
    entities:
      - name: horas_extra
        type: primary
        expr: horas_extra_key
      - name: empleado
        type: foreign
        expr: empleado_key
    dimensions:
      - name: fecha
        type: time
        expr: fecha
        type_params:
          time_granularity: day
      - name: tipo_dia
        type: categorical
      - name: tipo_salario
        type: categorical
    measures:
      - name: coste_total
        agg: sum
      - name: coste_diurno
        agg: sum
      - name: coste_nocturno
        agg: sum
      - name: total_horas
        agg: sum
      - name: bomberos_distintos
        agg: count_distinct
        expr: id_empleado

  - name: solicitudes
    model: ref('fact_solicitudes')
    primary_entity: solicitud
    defaults:
      agg_time_dimension: fecha_inicio
    entities:
      - name: solicitud
        type: primary
        expr: solicitud_key
      - name: empleado
        type: foreign
        expr: empleado_key
    dimensions:
      - name: fecha_inicio
        type: time
        expr: fecha_inicio
        type_params:
          time_granularity: day
      - name: estado
        type: categorical
      - name: tipo_permiso
        type: categorical
      - name: turno
        type: categorical
    measures:
      - name: conteo_solicitudes
        agg: count
        expr: id_solicitud
      - name: dias_solicitados
        agg: sum
      - name: suma_asignaciones
        agg: sum
        expr: total_asignaciones_generadas
      - name: suma_requerimientos
        agg: sum
        expr: total_requerimientos_generados

  - name: incidencias
    model: ref('fact_incidencias')
    primary_entity: incidencia
    defaults:
      agg_time_dimension: fecha_incidencia
    entities:
      - name: incidencia
        type: primary
        expr: incidencia_key
      - name: parque
        type: foreign
        expr: parque_key
      - name: empleado_creador
        type: foreign
        expr: empleado_creador_key
      - name: empleado_resolutor
        type: foreign
        expr: empleado_resolutor_key
    dimensions:
      - name: fecha_incidencia
        type: time
        expr: fecha_incidencia
        type_params:
          time_granularity: day
      - name: estado
        type: categorical
      - name: nivel_gravedad
        type: categorical
      - name: tipo_incidencia
        type: categorical
    measures:
      - name: total_incidencias
        agg: count
        expr: id_incidencia
      - name: incidencias_resueltas
        agg: sum
        expr: es_resuelta
      - name: incidencias_pendientes
        agg: sum
        expr: es_pendiente
      - name: incidencias_tramitadas
        agg: sum
        expr: es_tramitada
      - name: mttr_dias
        agg: average
        expr: dias_resolucion

metrics:
  - name: m_coste_total_horas_extra
    type: simple
    label: "Coste total de horas extra"
    type_params:
      measure:
        name: coste_total

  - name: m_total_horas_extra
    type: simple
    label: "Total de horas extra"
    type_params:
      measure:
        name: total_horas

  - name: m_coste_medio_por_hora
    type: ratio
    label: "Coste medio por hora extra"
    type_params:
      numerator: m_coste_total_horas_extra
      denominator: m_total_horas_extra

  - name: m_total_solicitudes
    type: simple
    label: "Total de solicitudes"
    type_params:
      measure:
        name: conteo_solicitudes

  - name: m_solicitudes_confirmadas
    type: simple
    label: "Solicitudes confirmadas"
    type_params:
      measure:
        name: conteo_solicitudes
    filter: "{{ Dimension('solicitudes__estado') }} = 'confirmada'"

  - name: m_tasa_aprobacion
    type: ratio
    label: "Tasa de aprobación"
    type_params:
      numerator: m_solicitudes_confirmadas
      denominator: m_total_solicitudes

  - name: m_ratio_requerimientos_por_solicitud
    type: ratio
    label: "Requerimientos por solicitud"
    type_params:
      numerator: m_total_requerimientos
      denominator: m_total_solicitudes

  - name: m_total_requerimientos
    type: simple
    label: "Total de requerimientos"
    type_params:
      measure:
        name: suma_requerimientos

  - name: m_tasa_resolucion
    type: ratio
    label: "Tasa de resolución"
    type_params:
      numerator: m_incidencias_resueltas
      denominator: m_total_incidencias

  - name: m_tasa_pendientes
    type: ratio
    label: "Tasa de pendientes"
    type_params:
      numerator: m_incidencias_pendientes
      denominator: m_total_incidencias

  - name: m_total_incidencias
    type: simple
    label: "Total de incidencias"
    type_params:
      measure:
        name: total_incidencias

  - name: m_incidencias_resueltas
    type: simple
    label: "Incidencias resueltas"
    type_params:
      measure:
        name: incidencias_resueltas

  - name: m_incidencias_pendientes
    type: simple
    label: "Incidencias pendientes"
    type_params:
      measure:
        name: incidencias_pendientes
